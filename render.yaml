services:
  - type: web
    name: whatsapp-tracker
    env: node
    plan: starter          # $7/month — stays awake 24/7 (important for webhooks)
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: WEBHOOK_VERIFY_TOKEN
        sync: false        # you'll paste this manually in Render dashboard
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
